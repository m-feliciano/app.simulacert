<router-outlet />

<div class="floating-theme-controls">
  @if (showThemeMenu()) {
    <div class="theme-dropdown sc-card sc-glass sc-glass--acrylic">
      <div class="dropdown-section">
        <label>{{ 'theme.mode' | translate }}</label>
        <div class="options-grid">
          <button (click)="themeService.setTheme('light')"
                  [class.active]="themeService.themeMode() === 'light'">{{ 'theme.light' | translate }}
          </button>
          <button (click)="themeService.setTheme('dark')"
                  [class.active]="themeService.themeMode() === 'dark'">{{ 'theme.dark' | translate }}
          </button>
          <button (click)="themeService.setTheme('warm')"
                  [class.active]="themeService.themeMode() === 'warm'">{{ 'theme.warm' | translate }}
          </button>
        </div>
      </div>
      <div class="dropdown-section">
        <label>{{ 'theme.fontSize' | translate }}</label>
        <div class="options-grid">
          <button (click)="themeService.setFontSize('extra-small')" [class.active]="themeService.fontSize() === 'extra-small'">PP</button>
          <button (click)="themeService.setFontSize('small')" [class.active]="themeService.fontSize() === 'small'">P</button>
          <button (click)="themeService.setFontSize('medium')" [class.active]="themeService.fontSize() === 'medium'">M</button>
          <button (click)="themeService.setFontSize('large')" [class.active]="themeService.fontSize() === 'large'">G</button>
          <button (click)="themeService.setFontSize('xlarge')" [class.active]="themeService.fontSize() === 'xlarge'">GG</button>
        </div>
      </div>
      <div class="dropdown-section">
        <label>{{ 'theme.fontFamily' | translate }}</label>
        <div class="options-grid">
          <button (click)="themeService.setFontFamily('sans')" [class.active]="themeService.fontFamily() === 'sans'"
                  style="font-family: var(--font-sans)">Sans</button>
          <button (click)="themeService.setFontFamily('serif')" [class.active]="themeService.fontFamily() === 'serif'"
                  style="font-family: var(--font-serif)">Serif</button>
          <button (click)="themeService.setFontFamily('mono')" [class.active]="themeService.fontFamily() === 'mono'"
                  style="font-family: var(--font-mono)">Mono</button>
          <button (click)="themeService.setFontFamily('fantasy')" [class.active]="themeService.fontFamily() === 'fantasy'"
                  style="font-family: var(--font-fantasy)">Fantasy</button>
          <button (click)="themeService.setFontFamily('slab')" [class.active]="themeService.fontFamily() === 'slab'"
                  style="font-family: var(--font-slab)">Slab</button>
          <button (click)="themeService.setFontFamily('system')" [class.active]="themeService.fontFamily() === 'system'"
                  style="font-family: var(--font-system)">System</button>
        </div>
      </div>
      <div class="dropdown-section">
        <label>{{ 'theme.language' | translate }}</label>
        <div class="options-grid">
          <button (click)="language = 'pt-BR'"
                  [class.active]="language === 'pt-BR'">{{ 'theme.portuguese' | translate }}
          </button>
          <button (click)="language = 'en-US'"
                  [class.active]="language === 'en-US'">{{ 'theme.english' | translate }}
          </button>
        </div>
      </div>
    </div>
  }
  <button (click)="toggleThemeMenu()" [title]="'theme.customize' | translate" class="floating-btn sc-glass">
    <lucide-icon [img]="icons.palette" class="icon"></lucide-icon>
  </button>
</div>
